name: Auto Game Fetcher

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-game-fetcher
  cancel-in-progress: false

jobs:
  fetch-game:
    # Avoid commit-trigger loops; this workflow only runs on schedule/manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run autonomous fetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python auto_game_bot.py

      - name: Commit and push when a new game is added
        shell: bash
        run: |
          if git diff --quiet -- games; then
            echo "No new game was fetched; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games
          git commit -m "chore: auto-fetch html5 game"
          git pull --rebase origin main
          git push origin HEAD:main
