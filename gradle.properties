# Required for Jetpack Compose, Activity, Lifecycle, Coil, and other AndroidX dependencies.
android.useAndroidX=true

# Keeps generated R classes smaller and avoids accidental cross-module resource coupling.
android.nonTransitiveRClass=true

# Reasonable defaults for CI builds on GitHub Actions.
org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
kotlin.code.style=official
